<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca - Libros</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

<header>
    <h1>📚 Sistema Biblioteca</h1>
</header>

<nav>
    <a href="/index.html">Inicio</a>
    <a href="/libros.html">Libros</a>
    <a href="/prestamos.html">Préstamos</a>
    <button onclick="cerrarSesion()">Cerrar sesión</button>
</nav>

<div class="container">

    <h2>Crear / Editar Libro</h2>

    <input type="hidden" id="libroId">

    <input type="text" id="titulo" placeholder="Título">
    <input type="text" id="autor" placeholder="Autor">
    <input type="number" id="anio" placeholder="Año">

    <button onclick="guardarLibro()">Guardar Libro</button>

    <hr>

    <h2>Listado de Libros</h2>

    <input
        type="text"
        id="buscar"
        placeholder="Buscar por título o autor"
    >

    <button onclick="buscarLibros()">Buscar</button>
    <button onclick="limpiarBusqueda()">Limpiar</button>

    <div id="listaLibros"></div>

</div>

<script>

const token = localStorage.getItem("token");

if (!token) {
    alert("Debes iniciar sesión");
    window.location.href = "/login.html";
}

async function cargarLibros(busqueda = "") {

    let url = "/api/libros";

    if (busqueda) {
        url = `/api/libros?buscar=${encodeURIComponent(busqueda)}`;
    }

    const respuesta = await fetch(url);
    const libros = await respuesta.json();

    const lista = document.getElementById("listaLibros");
    lista.innerHTML = "";

    libros.forEach(libro => {

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${libro.titulo}</h3>

            <p>
                <strong>Autor:</strong>
                ${libro.autor}
            </p>

            <p>
                <strong>Año:</strong>
                ${libro.anio}
            </p>

            <button
                class="btn-edit"
                onclick="editarLibro(
                    ${libro.id},
                    '${libro.titulo.replace(/'/g, "\\'")}',
                    '${libro.autor.replace(/'/g, "\\'")}',
                    ${libro.anio || 0}
                )"
            >
                Editar
            </button>

            <button
                class="btn-danger"
                onclick="eliminarLibro(${libro.id})"
            >
                Eliminar
            </button>
        `;

        lista.appendChild(card);
    });
}

function buscarLibros() {
    const texto = document.getElementById("buscar").value;
    cargarLibros(texto);
}

function limpiarBusqueda() {
    document.getElementById("buscar").value = "";
    cargarLibros();
}

async function guardarLibro() {

    const id = document.getElementById("libroId").value;

    const libro = {
        titulo: document.getElementById("titulo").value,
        autor: document.getElementById("autor").value,
        anio: document.getElementById("anio").value
    };

    let url = "/api/libros";
    let metodo = "POST";

    if (id) {
        url = `/api/libros/${id}`;
        metodo = "PUT";
    }

    const respuesta = await fetch(url, {
        method: metodo,
        headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify(libro)
    });

    const data = await respuesta.json();

    if (respuesta.ok) {
        alert(id ? "Libro actualizado" : "Libro creado");
        limpiarFormulario();
        cargarLibros();
    } else {
        alert(data.mensaje || "Error");
    }
}

function editarLibro(id, titulo, autor, anio) {

    document.getElementById("libroId").value = id;
    document.getElementById("titulo").value = titulo;
    document.getElementById("autor").value = autor;
    document.getElementById("anio").value = anio;
}

async function eliminarLibro(id) {

    if (!confirm("¿Eliminar libro?")) {
        return;
    }

    const respuesta = await fetch(`/api/libros/${id}`, {
        method: "DELETE",
        headers: {
            "Authorization": `Bearer ${token}`
        }
    });

    if (respuesta.ok) {
        cargarLibros();
    }
}

function limpiarFormulario() {

    document.getElementById("libroId").value = "";
    document.getElementById("titulo").value = "";
    document.getElementById("autor").value = "";
    document.getElementById("anio").value = "";
}

function cerrarSesion() {
    localStorage.removeItem("token");
    window.location.href = "/login.html";
}

cargarLibros();

</script>

</body>
</html>
